<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bulbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD84D"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="pencilGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9C4FE0"/>
      <stop offset="100%" stop-color="#7B2FBE"/>
    </linearGradient>
  </defs>

  <!-- Lightbulb glass body -->
  <path d="M32 8 C20 8 13 17 13 26 C13 33 17 38 22 41 L22 47 Q22 50 32 50 Q42 50 42 47 L42 41 C47 38 51 33 51 26 C51 17 44 8 32 8 Z"
        fill="url(#bulbGrad)" stroke="#C49A00" stroke-width="1.5"/>

  <!-- Screw base ridges -->
  <rect x="22" y="47" width="20" height="3" rx="1.5" fill="#9C4FE0" opacity="0.9"/>
  <rect x="23" y="51" width="18" height="3" rx="1.5" fill="#7B2FBE" opacity="0.9"/>
  <!-- Bottom cap -->
  <rect x="25" y="55" width="14" height="3" rx="1.5" fill="#9C4FE0"/>

  <!-- Pencil body (tilted inside the bulb) -->
  <g transform="translate(32,29) rotate(-35)">
    <!-- Pencil shaft -->
    <rect x="-4" y="-14" width="8" height="22" rx="1.5" fill="url(#pencilGrad)"/>
    <!-- Pencil eraser top -->
    <rect x="-4" y="-17" width="8" height="4" rx="1" fill="#FF8FA3"/>
    <!-- Eraser band -->
    <rect x="-4" y="-13.5" width="8" height="2" fill="#C49A00"/>
    <!-- Pencil tip wood -->
    <polygon points="-4,8 4,8 0,16" fill="#F5D095"/>
    <!-- Pencil tip graphite -->
    <polygon points="-1.5,13 1.5,13 0,16" fill="#555"/>
  </g>

  <!-- Shine highlight on bulb -->
  <ellipse cx="24" cy="20" rx="4" ry="6" fill="white" opacity="0.25" transform="rotate(-20,24,20)"/>
</svg>
